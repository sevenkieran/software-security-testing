name: Security Analysis

on:
  push:
    branches: [ main, format-integration ]
  pull_request:
    branches: [ format-integration ]

jobs:
  security-scan:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v4


      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake gcc build-essential jq


      - name: Build Security Analyzer
        run: |
          mkdir build
          cd build
          cmake ..
          make

      - name: Run Security Analysis
        run: |
          set -e
          ./build/MemoryLeakDetector -r test/ --json analysis-report.json . || echo "Analyzer exited with code $? (may be due to findings)"

      - name: Upload Analysis Report Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: analysis-report.json

      - name: Check for Violations
        run: |
          # This line is the same
          VIOLATIONS=$(jq '.total_violations' analysis-report.json)
          
          # --- This block is new and improved ---
          echo "=========================================="
          echo "         Security Analysis Report         "
          echo "=========================================="
          echo ""
          
          echo "Files with violations:"
          
          # This new jq command reads the .files array, filters for
          # any file with violations > 0, and prints it.
          jq -r '.files[] | select(.violations > 0) | "  \(.file): \(.violations) violations"' analysis-report.json
          
          echo ""
          echo "------------------------------------------"
          echo "  TOTAL VIOLATIONS FOUND: $VIOLATIONS"
          echo "------------------------------------------"
          
          # This logic is the same
          if [ "$VIOLATIONS" -gt 0 ]; then
            echo "Security analysis found $VIOLATIONS total violation(s)"
            exit 1
          else
            echo "All files passed security analysis!"
          fi